name: Intraday Evaluation

on:
  schedule:
    - cron: '30 14 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  intraday-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Intraday Evaluation
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: node trading-bot.js eval
      - name: Commit & push
        run: |
          git config user.email "bot@paper-trading-bot.local"
          git config user.name "Paper Trading Bot"
          git add trades.json
          git diff --staged --quiet || git commit -m "bot: intraday eval $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
