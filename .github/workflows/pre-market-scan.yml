name: Pre-Market Scan

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  pre-market-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Pre-Market Scan
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: node trading-bot.js scan
      - name: Commit & push
        run: |
          git config user.email "bot@paper-trading-bot.local"
          git config user.name "Paper Trading Bot"
          git add trades.json
          git diff --staged --quiet || git commit -m "bot: pre-market scan $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
